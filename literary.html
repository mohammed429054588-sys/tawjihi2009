<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفرع الأدبي - منصة توجيهي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f2442; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .header { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .header p { font-size: 16px; color: #8fa0bc; }
        
        .grid-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        
        .subject-card { background: linear-gradient(135deg, #1e3d6b, #102544); border: 2px solid #254bd2; padding: 20px 15px; border-radius: 20px; font-size: 20px; font-weight: bold; text-align: center; color: #fff; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .subject-card:active { transform: scale(0.98); }
        
        .btn-back { margin-top: 30px; background: transparent; border: 2px solid #8fa0bc; color: #8fa0bc; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: all 0.2s; margin-bottom: 20px; }
        .btn-back:active { background: rgba(143, 160, 188, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <h1>الفرع الأدبي 📚</h1>
        <p>اختر المادة للبدء في مسار التميز</p>
    </div>

    <div class="grid-container">
        <div class="subject-card">اللغة العربية (التخصص)</div>
        <div class="subject-card">التاريخ</div>
        <div class="subject-card">الجغرافيا</div>
        <div class="subject-card">الثقافة العلمية</div>
        
        <div class="subject-card">اللغة العربية (المشترك)</div>
        <div class="subject-card">اللغة الإنجليزية</div>
        <div class="subject-card">التربية الإسلامية</div>
        <div class="subject-card">التكنولوجيا</div>
    </div>

    <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>

</body>
</html>
